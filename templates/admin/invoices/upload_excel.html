{% extends "admin/base_site.html" %}

{% block content %}
<div id="content-main">
    <form action="" method="post" enctype="multipart/form-data" actions="">
        {% csrf_token %}
        <div>
            <fieldset class="module aligned">
                <h2>{{ title }}</h2>
                <div class="form-row">
                    <div>
                        <label class="required" for="id_excel_file">Excel file:</label>
                        {{ form.excel_file }}
                    </div>
                </div>
            </fieldset>
            
            <div class="submit-row">
                <input type="submit" value="Upload & Process" class="default" name="_save">
            </div>
        </div>
    </form>
</div>
{% endblock %}
